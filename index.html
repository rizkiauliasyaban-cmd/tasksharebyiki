<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskShare - Aplikasi Pembagian Tugas Kelompok</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhNfMGItIy54SoX_5iyuO0WUbZ_aIHcQA",
            authDomain: "taskshare-app1207.firebaseapp.com",
            projectId: "taskshare-app1207",
            storageBucket: "taskshare-app1207.firebasestorage.app",
            messagingSenderId: "248811604460",
            appId: "1:248811604460:web:c35b52013f821f470298c9",
            measurementId: "G-SHWFR8Z86K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.doc = doc;
        window.onSnapshot = onSnapshot;
        window.setDoc = setDoc;
        window.updateDoc = updateDoc;
        window.getDoc = getDoc;
    </script>
    <style> [v-cloak] { display: none; } </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased">
    <div id="app" v-cloak class="p-4 min-h-screen">
        <div v-if="!currentGroupId" class="flex flex-col items-center mt-20">
            <h1 class="text-3xl font-black mb-4">TaskShare Cloud</h1>
            <input v-model="joinId" placeholder="Masukkan ID Grup" class="border p-2 rounded mb-2 w-full max-w-sm">
            <button @click="joinGroup" class="bg-blue-600 text-white px-4 py-2 rounded w-full max-w-sm">Gabung</button>
            <button @click="createGroup" class="mt-4 text-blue-600 font-bold">Buat Grup Baru</button>
        </div>

        <div v-else class="max-w-2xl mx-auto">
            <h2 class="text-2xl font-bold mb-4">Grup ID: {{ currentGroupId }}</h2>
            <div class="bg-white p-4 shadow rounded">
                <h3 class="font-bold border-b pb-2 mb-2">Daftar Tugas</h3>
                <div v-for="task in groupData.tasks" :key="task.id" class="p-2 border-b">{{ task.title }}</div>
                <div class="flex gap-2 mt-4">
                    <input v-model="newTask" class="border p-2 flex-grow" placeholder="Tambah tugas baru...">
                    <button @click="addTask" class="bg-green-500 text-white px-4 py-2 rounded">Tambah</button>
                </div>
            </div>
            <button @click="currentGroupId = null" class="mt-4 text-red-500 text-sm">Keluar Grup</button>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;
        createApp({
            setup() {
                const currentGroupId = ref(null);
                const groupData = reactive({ tasks: [] });
                const joinId = ref('');
                const newTask = ref('');
                let unsubscribe = null;

                const createGroup = async () => {
                    const id = Math.random().toString(36).substring(7).toUpperCase();
                    await setDoc(doc(window.db, "groups", id), { tasks: [] });
                    currentGroupId.value = id;
                    listenToGroup(id);
                };

                const joinGroup = async () => {
                    const snap = await window.getDoc(window.doc(window.db, "groups", joinId.value));
                    if (snap.exists()) {
                        currentGroupId.value = joinId.value;
                        listenToGroup(joinId.value);
                    } else { alert("Grup dak ketemu, cek lagi ID-nya!"); }
                };

                const listenToGroup = (id) => {
                    if (unsubscribe) unsubscribe();
                    unsubscribe = window.onSnapshot(window.doc(window.db, "groups", id), (doc) => {
                        if(doc.exists()) Object.assign(groupData, doc.data());
                    });
                };

                const addTask = async () => {
                    if(!newTask.value) return;
                    const taskList = groupData.tasks ? [...groupData.tasks] : [];
                    taskList.push({ id: Date.now(), title: newTask.value });
                    await window.updateDoc(window.doc(window.db, "groups", currentGroupId.value), { tasks: taskList });
                    newTask.value = '';
                };

                return { currentGroupId, groupData, joinId, newTask, createGroup, joinGroup, addTask };
            }
        }).mount('#app');
    </script>
</body>
</html>
