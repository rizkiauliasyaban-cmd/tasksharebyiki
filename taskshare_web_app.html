<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskShare - Pembagian Tugas Kelompok Simpel & Privat</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind Custom Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            fadeIn: 'fadeIn 0.25s ease-out forwards',
            slideUp: 'slideUp 0.3s ease-out forwards',
            popIn: 'popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(15px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            popIn: {
              '0%': { transform: 'scale(0.95)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <!-- Firebase Compat SDKs (Lancar dibuka offline/lokal lewat file://) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    /* Custom Scrollbar for modern feel */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen">

  <!-- MAIN APP CONTAINER -->
  <div id="app" class="min-h-screen flex flex-col justify-between">
    <!-- View akan dimuat secara dinamis melalui JavaScript -->
    <div class="flex-1 flex items-center justify-center">
      <div class="animate-spin text-blue-600">
        <svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <circle cx="12" cy="12" r="10" stroke-dasharray="30 30"></circle>
        </svg>
      </div>
    </div>
  </div>

  <!-- INLINE SVG ICONS (Lucide Equivalents) -->
  <script>
    const usersIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`;
    const clockIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
    const plusIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;
    const trashIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;
    const checkCircleIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
    const circleIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>`;
    const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
    const logoutIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>`;
    const sendIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`;
    const messageIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`;
    const checkSquareIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>`;
    const arrowRightIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;
    const alertIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
  </script>

  <!-- APPLICATION CORE CODE -->
  <script>
    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyDummyKeyForLocalHostingOnly",
      authDomain: "taskshare-app.firebaseapp.com",
      projectId: "taskshare-app",
      storageBucket: "taskshare-app.appspot.com",
      messagingSenderId: "12345678",
      appId: "1:123:web:abc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'taskshare-app';

    // App State
    let state = {
      user: null,
      currentGroupId: null,
      group: null,
      myProfile: null,
      activeTab: 'tasks', // 'tasks' | 'chat' (responsive mobile)
      isCreating: false,  // Home tab state
      showAddTask: false,
      copiedText: false,
      loading: true,
      error: ''
    };

    // Subscriptions
    let groupUnsubscribe = null;

    // Helper functions
    const generateId = (length = 6) => {
      return Math.random().toString(36).substring(2, 2 + length).toUpperCase();
    };

    // Safe History manipulation
    const safePushState = (gId) => {
      try {
        const cleanPath = window.location.origin + window.location.pathname;
        const newUrl = gId ? `${cleanPath}?g=${gId}` : cleanPath;
        window.history.pushState({}, document.title, newUrl);
      } catch (e) {
        console.warn("History pushState diblokir oleh sandbox iframe:", e);
      }
    };

    // Fallback Clipboard API
    const copyToClipboard = async (text) => {
      const fallbackCopy = () => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          textArea.remove();
          return true;
        } catch (err) {
          console.error('Fallback copy failed', err);
          textArea.remove();
          return false;
        }
      };

      try {
        if (navigator.clipboard && window.isSecureContext) {
          try {
            await navigator.clipboard.writeText(text);
            return true;
          } catch (clipboardError) {
            return fallbackCopy();
          }
        } else {
          return fallbackCopy();
        }
      } catch (err) {
        console.error('Failed to copy', err);
        return fallbackCopy();
      }
    };

    // --- MAIN INITIALIZATION LOOP ---
    window.onload = async () => {
      try {
        // Authenticate Anonymously first
        await auth.signInAnonymously();
        auth.onAuthStateChanged((user) => {
          state.user = user;
          
          // Check URL query parameters
          const urlParams = new URLSearchParams(window.location.search);
          const g = urlParams.get('g');
          if (g) {
            const cleanId = g.split(/[?#]/)[0].trim().toUpperCase();
            if (cleanId) {
              joinGroup(cleanId);
              return;
            }
          }
          
          state.loading = false;
          render();
        });
      } catch (err) {
        console.error("Auth Error:", err);
        state.error = 'Koneksi gagal. Periksa jaringan Anda.';
        state.loading = false;
        render();
      }
    };

    // --- APPLICATION CONTROLLERS ---
    function joinGroup(groupId) {
      state.loading = true;
      state.currentGroupId = groupId;
      safePushState(groupId);
      render();

      const cleanGroupId = groupId.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
      const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(cleanGroupId);

      if (groupUnsubscribe) groupUnsubscribe();

      groupUnsubscribe = groupRef.onSnapshot((docSnap) => {
        if (docSnap.exists) {
          const data = docSnap.data();
          state.group = data;
          state.loading = false;
          state.error = '';

          // Verify identity in localStorage
          const savedProfileStr = localStorage.getItem(`taskshare_member_${cleanGroupId}`);
          if (savedProfileStr) {
            const profile = JSON.parse(savedProfileStr);
            const exists = data.members.find(m => m.id === profile.id);
            if (exists) {
              state.myProfile = profile;
            } else {
              state.myProfile = null;
            }
          } else {
            state.myProfile = null;
          }

          render();
        } else {
          state.error = 'Grup tidak ditemukan. Silakan periksa kembali ID kelompok Anda.';
          state.loading = false;
          state.currentGroupId = null;
          safePushState(null);
          render();
        }
      }, (err) => {
        console.error(err);
        state.error = 'Gagal memuat data dari database.';
        state.loading = false;
        render();
      });
    }

    function leaveGroup() {
      if (groupUnsubscribe) groupUnsubscribe();
      state.currentGroupId = null;
      state.group = null;
      state.myProfile = null;
      state.error = '';
      safePushState(null);
      render();
    }

    // --- TEMPLATE RENDERING GENERATORS ---
    function render() {
      const appDiv = document.getElementById('app');

      if (state.loading) {
        appDiv.innerHTML = `
          <div class="flex-1 flex items-center justify-center min-h-screen">
            <div class="animate-spin text-blue-600">
              <svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <circle cx="12" cy="12" r="10" stroke-dasharray="30 30" stroke="currentColor"></circle>
              </svg>
            </div>
          </div>
        `;
        return;
      }

      if (!state.currentGroupId) {
        renderHome(appDiv);
      } else {
        renderDashboard(appDiv);
      }
    }

    // --- HOME SCREEN ---
    function renderHome(container) {
      container.innerHTML = `
        <div class="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-blue-50 to-white animate-fadeIn">
          <div class="text-center mb-8">
            <div class="bg-blue-600 text-white p-3 rounded-2xl inline-block mb-4 shadow-lg">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">TaskShare</h1>
            <p class="text-slate-500 mt-2 max-w-sm mx-auto">Aplikasi pembagian tugas kelompok yang simpel, cepat, dan privat untuk pelajar & mahasiswa.</p>
          </div>

          <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            <div class="flex border-b border-slate-100">
              <button id="tab-join-btn" class="flex-1 py-4 text-sm font-semibold transition-colors ${!state.isCreating ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/30' : 'text-slate-400 hover:text-slate-600'}">
                Gabung Grup
              </button>
              <button id="tab-create-btn" class="flex-1 py-4 text-sm font-semibold transition-colors ${state.isCreating ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/30' : 'text-slate-400 hover:text-slate-600'}">
                Buat Grup Baru
              </button>
            </div>

            <div class="p-6 md:p-8">
              ${state.error ? `
                <div class="mb-4 p-3 bg-red-50 text-red-600 rounded-lg flex items-center text-sm">
                  ${alertIcon} <span class="ml-2">${state.error}</span>
                </div>
              ` : ''}

              ${!state.isCreating ? `
                <form id="join-form" class="space-y-4">
                  <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ID Grup atau Link</label>
                    <input type="text" id="join-id-input" placeholder="Contoh: X7K29P atau tempel Link" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none">
                  </div>
                  <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold flex items-center justify-center transition-colors">
                    Masuk ke Grup ${arrowRightIcon}
                  </button>
                </form>
              ` : `
                <form id="create-form" class="space-y-4">
                  <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Kelompok / Tugas</label>
                    <input type="text" id="create-group-name" placeholder="Contoh: Proyek Biologi Kelas 12" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none">
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Anda</label>
                    <input type="text" id="create-your-name" placeholder="Masukkan nama panggilanmu" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none">
                  </div>
                  <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold flex items-center justify-center transition-colors">
                    Buat Grup ${plusIcon}
                  </button>
                </form>
              `}
            </div>
          </div>
          
          <p class="text-slate-400 text-sm mt-8">Keamanan dijamin. Grup Anda sepenuhnya privat.</p>
        </div>
      `;

      // Event listeners for Home Tab
      document.getElementById('tab-join-btn').addEventListener('click', () => {
        state.isCreating = false;
        state.error = '';
        render();
      });
      document.getElementById('tab-create-btn').addEventListener('click', () => {
        state.isCreating = true;
        state.error = '';
        render();
      });

      if (!state.isCreating) {
        document.getElementById('join-form').addEventListener('submit', (e) => {
          e.preventDefault();
          let rawId = document.getElementById('join-id-input').value.trim();
          if (rawId.includes('?g=')) {
            const parts = rawId.split('?g=');
            rawId = parts[1] ? parts[1].split('&')[0] : rawId;
          }
          const cleanId = rawId.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
          if (cleanId) joinGroup(cleanId);
        });
      } else {
        document.getElementById('create-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const gName = document.getElementById('create-group-name').value.trim();
          const uName = document.getElementById('create-your-name').value.trim();
          
          if (!gName || !uName) return;
          state.loading = true;
          render();

          try {
            const newGroupId = generateId(6);
            const memberId = generateId(8);
            const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(newGroupId);
            
            await groupRef.set({
              id: newGroupId,
              name: gName,
              createdAt: Date.now(),
              members: [{ id: memberId, name: uName }],
              tasks: [],
              chats: []
            });

            localStorage.setItem(`taskshare_member_${newGroupId}`, JSON.stringify({ id: memberId, name: uName }));
            joinGroup(newGroupId);
          } catch (err) {
            console.error("Gagal membuat grup:", err);
            state.error = 'Gagal membuat grup baru. Silakan coba lagi.';
            state.loading = false;
            render();
          }
        });
      }
    }

    // --- DASHBOARD PANEL ---
    function renderDashboard(container) {
      const tasks = state.group?.tasks || [];
      const completedTasks = tasks.filter(t => t.status === 'done').length;
      const progressPercent = tasks.length === 0 ? 0 : Math.round((completedTasks / tasks.length) * 100);

      container.innerHTML = `
        <div class="min-h-screen flex flex-col animate-fadeIn">
          <!-- Main Header -->
          <header class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div class="flex items-center">
                <button id="leave-group-btn" class="p-2 -ml-2 mr-2 text-slate-400 hover:text-slate-600 rounded-lg hover:bg-slate-100 transition-colors" title="Keluar dari grup">
                  ${logoutIcon}
                </button>
                <div>
                  <h1 class="text-base sm:text-lg font-bold text-slate-800 leading-tight">${state.group.name}</h1>
                  <div class="text-xs text-slate-500 flex items-center mt-0.5">
                    ${usersIcon} <span class="ml-1">${state.group.members.length} Anggota</span>
                  </div>
                </div>
              </div>
              
              <button id="copy-link-btn" class="flex items-center px-4 py-2 rounded-full text-sm font-medium transition-all ${state.copiedText ? 'bg-green-100 text-green-700' : 'bg-blue-50 text-blue-700 hover:bg-blue-100'}">
                ${state.copiedText ? checkCircleIcon : copyIcon}
                <span class="ml-1.5">${state.copiedText ? 'Link Disalin!' : 'Bagikan Link'}</span>
              </button>
            </div>
          </header>

          <!-- Main Layout -->
          <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-4 gap-6 py-6 pb-24 lg:pb-6">
            
            <!-- Tasks Column -->
            <div class="lg:col-span-3 flex flex-col gap-6 ${state.activeTab !== 'tasks' ? 'hidden lg:flex' : 'flex'}">
              
              <!-- Progress Bar -->
              <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-end mb-2">
                  <div>
                    <h3 class="text-sm font-semibold text-slate-700">Progress Tugas Kelompok</h3>
                    <p class="text-xs text-slate-500">${completedTasks} dari ${tasks.length} tugas selesai</p>
                  </div>
                  <span class="text-2xl font-extrabold text-blue-600">${progressPercent}%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                  <div class="bg-blue-500 h-3 rounded-full transition-all duration-700 ease-out" style="width: ${progressPercent}%"></div>
                </div>
              </div>

              <!-- Tasks Board Container -->
              <div class="flex flex-col h-full bg-transparent">
                <div class="flex justify-between items-center mb-4">
                  <h2 class="text-xl font-bold text-slate-800">Daftar Tugas</h2>
                  <button id="add-task-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center transition-colors shadow-sm">
                    ${plusIcon} <span class="ml-1">Tambah Tugas</span>
                  </button>
                </div>

                <!-- Add Task Interactive Dialog -->
                ${state.showAddTask ? `
                  <div class="bg-white p-5 rounded-2xl shadow-md border border-slate-200 mb-6 animate-slideUp">
                    <div class="flex justify-between items-center mb-4">
                      <h3 class="font-bold text-slate-800">Tugas Kelompok Baru</h3>
                      <button id="close-add-task-btn" class="text-slate-400 hover:text-slate-600">${trashIcon}</button>
                    </div>
                    <form id="task-creation-form" class="space-y-4">
                      <div>
                        <input type="text" id="new-task-title" placeholder="Apa yang harus diselesaikan?" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-500">
                      </div>
                      <div class="flex flex-col sm:flex-row gap-4">
                        <div class="flex-1">
                          <select id="new-task-assignee" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none text-sm text-slate-700">
                            <option value="">Pilih Penanggung Jawab (Opsional)</option>
                            ${state.group.members.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
                          </select>
                        </div>
                        <div class="flex-1">
                          <input type="date" id="new-task-deadline" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none text-sm text-slate-700">
                        </div>
                      </div>
                      <div class="flex justify-end pt-2">
                        <button type="button" id="cancel-task-btn" class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700 mr-2">Batal</button>
                        <button type="submit" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl transition-colors">Simpan Tugas</button>
                      </div>
                    </form>
                  </div>
                ` : ''}

                <!-- Tasks Columns representation -->
                ${tasks.length === 0 && !state.showAddTask ? `
                  <div class="bg-white rounded-2xl border border-dashed border-slate-300 p-10 text-center animate-fadeIn">
                    <div class="mx-auto w-16 h-16 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center mb-4">
                      ${checkSquareIcon}
                    </div>
                    <h3 class="text-lg font-semibold text-slate-700 mb-1">Belum ada tugas kelompok</h3>
                    <p class="text-slate-500 text-sm mb-4">Mulai bagikan tugas pertama ke anggota kelompokmu.</p>
                    <button id="create-first-task-btn" class="text-blue-600 font-medium hover:text-blue-700 text-sm">+ Buat Tugas Pertama</button>
                  </div>
                ` : `
                  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                    ${getTaskColumnHTML('Belum Dikerjakan', tasks.filter(t => t.status === 'todo'), 'slate')}
                    ${getTaskColumnHTML('Sedang Dikerjakan', tasks.filter(t => t.status === 'in-progress'), 'blue')}
                    ${getTaskColumnHTML('Selesai', tasks.filter(t => t.status === 'done'), 'green')}
                  </div>
                `}
              </div>
            </div>

            <!-- Discussion / Chat Column -->
            <div class="lg:col-span-1 flex flex-col h-[calc(100vh-140px)] lg:h-auto ${state.activeTab !== 'chat' ? 'hidden lg:flex' : 'flex'}">
              <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
                <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                  <h3 class="font-bold text-slate-800 flex items-center">
                    ${messageIcon} <span class="ml-2">Diskusi Kelompok</span>
                  </h3>
                  <span class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-semibold">
                    ${state.group.chats?.length || 0}
                  </span>
                </div>

                <!-- Chat Feed -->
                <div id="chat-messages-container" class="flex-1 p-4 overflow-y-auto bg-slate-50/30 space-y-4">
                  ${(!state.group.chats || state.group.chats.length === 0) ? `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400">
                      ${messageIcon}
                      <p class="text-sm mt-1">Belum ada pesan obrolan.</p>
                    </div>
                  ` : state.group.chats.map((chat, idx) => {
                      const isMe = state.myProfile && chat.senderId === state.myProfile.id;
                      const showName = idx === 0 || state.group.chats[idx-1].senderId !== chat.senderId;
                      return `
                        <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                          ${showName && !isMe ? `<span class="text-[10px] text-slate-500 ml-1 mb-1 font-medium">${chat.senderName}</span>` : ''}
                          <div class="max-w-[85%] px-3 py-2 rounded-2xl text-sm ${isMe ? 'bg-blue-600 text-white rounded-br-none' : 'bg-white border border-slate-200 text-slate-700 rounded-bl-none shadow-sm'}">
                            ${chat.text}
                          </div>
                        </div>
                      `;
                    }).join('')}
                </div>

                <!-- Message input footer -->
                <div class="p-3 bg-white border-t border-slate-100">
                  ${state.myProfile ? `
                    <form id="chat-submit-form" class="flex items-center bg-slate-100 rounded-full p-1 pl-4">
                      <input type="text" id="chat-input-text" placeholder="Ketik pesan kelompok..." required class="flex-1 bg-transparent border-none outline-none text-sm text-slate-700">
                      <button type="submit" class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center hover:bg-blue-700 transition-colors">
                        ${sendIcon}
                      </button>
                    </form>
                  ` : `
                    <div class="text-center text-xs text-slate-500 p-2 bg-slate-50 rounded-xl">Tentukan identitas Anda untuk ikut berdiskusi.</div>
                  `}
                </div>
              </div>
            </div>
          </main>

          <!-- Navigation footer for Mobile Viewports -->
          <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex z-30">
            <button id="nav-tasks-tab" class="flex-1 py-4 flex flex-col items-center text-xs font-medium ${state.activeTab === 'tasks' ? 'text-blue-600' : 'text-slate-500'}">
              ${checkSquareIcon} <span class="mt-0.5">Tugas</span>
            </button>
            <button id="nav-chat-tab" class="flex-1 py-4 flex flex-col items-center text-xs font-medium ${state.activeTab === 'chat' ? 'text-blue-600' : 'text-slate-500'} relative">
              <div class="relative">
                ${messageIcon}
                ${state.group.chats?.length > 0 && state.activeTab !== 'chat' ? `<span class="absolute -top-1 -right-2 w-2.5 h-2.5 bg-red-500 rounded-full border border-white"></span>` : ''}
              </div>
              <span class="mt-0.5">Diskusi</span>
            </button>
          </div>

          <!-- Identity Registration Dialog -->
          ${!state.myProfile ? `
            <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div class="bg-white rounded-3xl p-6 md:p-8 max-w-md w-full shadow-2xl animate-popIn">
                <div class="text-center mb-6">
                  <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    ${usersIcon}
                  </div>
                  <h2 class="text-2xl font-bold text-slate-800">Selamat datang!</h2>
                  <p class="text-slate-500 mt-1">Bergabunglah di kelompok "${state.group.name}"</p>
                </div>

                ${state.group.members && state.group.members.length > 0 ? `
                  <div class="mb-6">
                    <p class="text-sm font-medium text-slate-700 mb-3 text-center">Pilih profil Anda jika sudah terdaftar:</p>
                    <div class="flex flex-wrap justify-center gap-2 max-h-32 overflow-y-auto">
                      ${state.group.members.map(m => `
                        <button onclick="claimIdentity('${m.id}', '${m.name}')" class="px-4 py-2 bg-slate-100 hover:bg-blue-50 text-slate-700 hover:text-blue-700 rounded-xl text-sm transition-colors border border-transparent hover:border-blue-200">
                          ${m.name}
                        </button>
                      `).join('')}
                    </div>
                  </div>
                  <div class="relative flex items-center py-2 mb-4">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase tracking-wider">Atau Profil Baru</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                  </div>
                ` : ''}

                <form id="new-member-form">
                  <input type="text" id="new-member-name" placeholder="Masukkan nama Anda" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none">
                  <button type="submit" class="w-full mt-3 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition-colors">Masuk ke Kelompok</button>
                </form>
              </div>
            </div>
          ` : ''}
        </div>
      `;

      // Scroll to bottom of chat area
      const chatFeed = document.getElementById('chat-messages-container');
      if (chatFeed) chatFeed.scrollTop = chatFeed.scrollHeight;

      // Attach Dashboard Event Handlers
      setupDashboardListeners();
    }

    // --- SUB-TEMPLATES & EVENT LISTENERS ---
    function getTaskColumnHTML(title, tasks, color) {
      const dotColors = { slate: 'bg-slate-400', blue: 'bg-blue-500', green: 'bg-green-500' };
      const badgeColors = { slate: 'bg-slate-100 text-slate-700', blue: 'bg-blue-100 text-blue-700', green: 'bg-green-100 text-green-700' };
      
      return `
        <div class="bg-slate-100/50 rounded-2xl p-4 flex flex-col min-h-[300px] animate-fadeIn">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center">
              <div class="w-2.5 h-2.5 rounded-full mr-2 ${dotColors[color]}"></div>
              <h3 class="font-bold text-slate-700 text-sm uppercase tracking-wider">${title}</h3>
            </div>
            <span class="text-xs font-bold px-2 py-0.5 rounded-full ${badgeColors[color]}">${tasks.length}</span>
          </div>

          <div class="flex flex-col gap-3 flex-1">
            ${tasks.map(task => {
              const assignee = state.group.members.find(m => m.id === task.assigneeId);
              const isMine = state.myProfile && task.assigneeId === state.myProfile.id;
              
              // Overdue detection
              let isOverdue = false;
              let deadlineStr = '';
              if (task.deadline) {
                const today = new Date();
                today.setHours(0,0,0,0);
                const dlDate = new Date(task.deadline);
                if (dlDate < today && task.status !== 'done') isOverdue = true;
                deadlineStr = dlDate.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
              }

              return `
                <div class="bg-white p-4 rounded-xl shadow-sm border ${isMine ? 'border-blue-200 shadow-blue-100/50' : 'border-slate-100'} hover:shadow-md transition-shadow relative group animate-popIn">
                  <!-- Actions Trigger Overlay -->
                  <div class="absolute top-3 right-3 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity flex bg-white rounded-md shadow-sm border border-slate-100 z-10">
                    <select onchange="updateTaskStatus('${task.id}', this.value)" class="text-xs py-1 px-2 bg-transparent outline-none cursor-pointer text-slate-600 font-medium">
                      <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>Belum</option>
                      <option value="in-progress" ${task.status === 'in-progress' ? 'selected' : ''}>Sedang</option>
                      <option value="done" ${task.status === 'done' ? 'selected' : ''}>Selesai</option>
                    </select>
                    <button onclick="deleteTask('${task.id}')" class="px-2 text-slate-400 hover:text-red-500 border-l border-slate-100">
                      ${trashIcon}
                    </button>
                  </div>

                  <div class="flex items-start mb-3 pr-16">
                    <button onclick="toggleTaskCompletion('${task.id}', '${task.status}')" class="mt-0.5 mr-3 flex-shrink-0 ${task.status === 'done' ? 'text-green-500' : 'text-slate-300 hover:text-blue-400'}">
                      ${task.status === 'done' ? checkCircleIcon : circleIcon}
                    </button>
                    <h4 class="text-sm font-medium ${task.status === 'done' ? 'text-slate-400 line-through' : 'text-slate-800'}">${task.title}</h4>
                  </div>

                  <div class="flex items-center justify-between mt-auto pt-2 border-t border-slate-50">
                    <div>
                      ${assignee ? `
                        <div class="flex items-center ${isMine ? 'bg-blue-50 text-blue-700 border border-blue-100' : 'bg-slate-100 text-slate-600'} px-2 py-1 rounded-md text-[10px] font-bold">
                          <div class="w-4 h-4 bg-white rounded-full flex items-center justify-center mr-1 shadow-sm text-slate-400">${usersIcon}</div>
                          ${isMine ? 'Kamu' : assignee.name}
                        </div>
                      ` : `
                        <span class="text-[10px] text-slate-400 italic bg-slate-50 px-2 py-1 rounded-md">Belum Ada</span>
                      `}
                    </div>

                    ${task.deadline ? `
                      <div class="flex items-center text-[10px] font-bold px-2 py-1 rounded-md ${isOverdue ? 'bg-red-50 text-red-600' : 'bg-slate-100 text-slate-500'}">
                        ${clockIcon} <span class="ml-1">${deadlineStr}</span>
                      </div>
                    ` : ''}
                  </div>
                </div>
              `;
            }).join('')}
            ${tasks.length === 0 ? `
              <div class="flex-1 flex items-center justify-center border-2 border-dashed border-slate-200 rounded-xl opacity-50 p-6">
                <span class="text-xs text-slate-400 font-medium">Kosong</span>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // --- ACTION LISTENERS ---
    function setupDashboardListeners() {
      // Leave group controller
      document.getElementById('leave-group-btn').addEventListener('click', leaveGroup);

      // Copy Link controller
      document.getElementById('copy-link-btn').addEventListener('click', async () => {
        const cleanPath = window.location.origin + window.location.pathname;
        const link = `${cleanPath}?g=${state.currentGroupId}`;
        const success = await copyToClipboard(link);
        if (success) {
          state.copiedText = true;
          render();
          setTimeout(() => {
            state.copiedText = false;
            render();
          }, 2000);
        }
      });

      // Add task dynamic togglers
      document.getElementById('add-task-btn').addEventListener('click', () => {
        state.showAddTask = !state.showAddTask;
        render();
      });

      const firstTaskBtn = document.getElementById('create-first-task-btn');
      if (firstTaskBtn) {
        firstTaskBtn.addEventListener('click', () => {
          state.showAddTask = true;
          render();
        });
      }

      if (state.showAddTask) {
        document.getElementById('close-add-task-btn').addEventListener('click', () => {
          state.showAddTask = false;
          render();
        });
        document.getElementById('cancel-task-btn').addEventListener('click', () => {
          state.showAddTask = false;
          render();
        });

        document.getElementById('task-creation-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const title = document.getElementById('new-task-title').value.trim();
          const assigneeId = document.getElementById('new-task-assignee').value;
          const deadline = document.getElementById('new-task-deadline').value;

          if (!title) return;

          const newTask = {
            id: generateId(8),
            title: title,
            assigneeId: assigneeId || null,
            deadline: deadline || null,
            status: 'todo',
            createdAt: Date.now()
          };

          const cleanGroupId = state.group.id.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
          const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(cleanGroupId);

          try {
            await groupRef.update({
              tasks: firebase.firestore.FieldValue.arrayUnion(newTask)
            });
            state.showAddTask = false;
            render();
          } catch (err) {
            console.error("Gagal menambah tugas:", err);
            alert("Gagal menambahkan tugas kelompok.");
          }
        });
      }

      // Chat submission logic
      const chatForm = document.getElementById('chat-submit-form');
      if (chatForm) {
        chatForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const textInput = document.getElementById('chat-input-text');
          const message = textInput.value.trim();
          if (!message || !state.myProfile) return;

          const newChat = {
            id: generateId(8),
            senderId: state.myProfile.id,
            senderName: state.myProfile.name,
            text: message,
            timestamp: Date.now()
          };

          const cleanGroupId = state.group.id.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
          const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(cleanGroupId);

          try {
            textInput.value = '';
            await groupRef.update({
              chats: firebase.firestore.FieldValue.arrayUnion(newChat)
            });
          } catch (err) {
            console.error("Gagal mengirim obrolan:", err);
          }
        });
      }

      // Responsive Mobile Nav tabs logic
      document.getElementById('nav-tasks-tab').addEventListener('click', () => {
        state.activeTab = 'tasks';
        render();
      });
      document.getElementById('nav-chat-tab').addEventListener('click', () => {
        state.activeTab = 'chat';
        render();
      });

      // Register new member registration flow
      const memberForm = document.getElementById('new-member-form');
      if (memberForm) {
        memberForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const inputName = document.getElementById('new-member-name').value.trim();
          if (!inputName) return;

          const memberId = generateId(8);
          const newMember = { id: memberId, name: inputName };

          const cleanGroupId = state.group.id.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
          const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(cleanGroupId);

          try {
            await groupRef.update({
              members: firebase.firestore.FieldValue.arrayUnion(newMember)
            });
            localStorage.setItem(`taskshare_member_${cleanGroupId}`, JSON.stringify(newMember));
            state.myProfile = newMember;
            render();
          } catch (err) {
            console.error("Gagal bergabung sebagai anggota baru:", err);
            alert("Gagal menambahkan profil baru.");
          }
        });
      }
    }

    // Identity claimer helper
    window.claimIdentity = (id, name) => {
      const cleanGroupId = state.group.id.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
      const profile = { id, name };
      localStorage.setItem(`taskshare_member_${cleanGroupId}`, JSON.stringify(profile));
      state.myProfile = profile;
      render();
    };

    // Update individual task states
    window.updateTaskStatus = async (taskId, newStatus) => {
      const updatedTasks = state.group.tasks.map(t => 
        t.id === taskId ? { ...t, status: newStatus } : t
      );
      const cleanGroupId = state.group.id.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
      const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(cleanGroupId);
      
      try {
        await groupRef.update({ tasks: updatedTasks });
      } catch (e) {
        console.error(e);
      }
    };

    // Toggle task quick check/uncheck status
    window.toggleTaskCompletion = async (taskId, currentStatus) => {
      const newStatus = currentStatus === 'done' ? 'todo' : 'done';
      await updateTaskStatus(taskId, newStatus);
    };

    // Delete task controller
    window.deleteTask = async (taskId) => {
      if (!confirm('Apakah Anda yakin ingin menghapus tugas ini?')) return;
      
      const updatedTasks = state.group.tasks.filter(t => t.id !== taskId);
      const cleanGroupId = state.group.id.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
      const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(cleanGroupId);
      
      try {
        await groupRef.update({ tasks: updatedTasks });
      } catch (e) {
        console.error(e);
      }
    };
  </script>
</body>
</html>
